<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sayı Tahmin Oyunu</title>

<style>

body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    transition:0.5s;
}

.oyun{
    background:rgba(0,0,0,0.6);
    padding:40px;
    width:320px;
    margin:auto;
    border-radius:15px;
    box-shadow:0px 0px 20px #00ffcc;
}

h1{
    color:#00ffcc;
}

button{
    font-size:20px;
    padding:6px 20px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="oyun">

<h1>Sayı Tahmin Oyunu</h1>
<p>1 ile 10 arasında bir sayı tahmin et!</p>

<form method="GET" action="/tahmin">
<input type="number" name="sayi" min="1" max="10" required>
<br><br>
<button type="submit">Tahmin Et</button>
</form>

<p>{{sonuc}}</p>

</div>

<script>

let kazandi = "{{kazandi}}"

if(kazandi == "true"){
    document.body.style.background = "green"

    setTimeout(function(){
        location.href="/"
    },1500)
}

</script>

</body>
</html>
